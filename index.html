<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1a1a1e" media="(prefers-color-scheme: dark)">
<title>Baby Tracker</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f5f5f7;--surface:#fff;--text:#1d1d1f;--text2:#6e6e73;
    --still:#c084fc;--still-bg:#f3e8ff;
    --wickel:#22d3ee;--wickel-bg:#e0f7fa;
    --temp:#fb923c;--temp-bg:#fff7ed;
    --danger:#ef4444;--radius:16px;--shadow:0 2px 12px rgba(0,0,0,.08);
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#1a1a1e;--surface:#2a2a2e;--text:#f5f5f7;--text2:#98989d;
      --still-bg:#3b1f5e;--wickel-bg:#164e55;--temp-bg:#4a2c14;
      --shadow:0 2px 12px rgba(0,0,0,.3);
    }
  }
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;padding-bottom:calc(2rem + env(safe-area-inset-bottom,0px));-webkit-tap-highlight-color:transparent}
  header{text-align:center;padding:calc(1.5rem + env(safe-area-inset-top,0px)) 1rem .5rem;position:sticky;top:0;background:var(--bg);z-index:10}
  header h1{font-size:1.4rem;font-weight:700;display:inline;vertical-align:middle}
  .info-badge{display:inline-flex;align-items:center;justify-content:center;width:1.2rem;height:1.2rem;border-radius:50%;background:var(--text2);color:var(--surface);font-size:.7rem;font-weight:700;cursor:pointer;vertical-align:middle;margin-left:.4rem;position:relative;font-style:normal}
  .info-tooltip{display:none;position:absolute;top:1.6rem;left:50%;transform:translateX(-50%);background:var(--surface);color:var(--text2);font-size:.7rem;font-weight:400;white-space:nowrap;padding:.35rem .6rem;border-radius:8px;box-shadow:var(--shadow);z-index:20}
  .info-badge.show .info-tooltip{display:block}
  #clock{font-size:2.2rem;font-weight:200;font-variant-numeric:tabular-nums;letter-spacing:.02em}
  .actions{display:flex;gap:.75rem;padding:1rem;max-width:500px;margin:0 auto}
  .action-btn{flex:1;border:none;border-radius:var(--radius);padding:1.2rem .5rem;font-size:.95rem;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:.4rem;transition:transform .15s,box-shadow .15s;box-shadow:var(--shadow)}
  .action-btn:active{transform:scale(.95)}
  .action-btn .icon{font-size:1.8rem}
  .btn-stillen{background:var(--still-bg);color:var(--still)}
  .btn-wickeln{background:var(--wickel-bg);color:var(--wickel)}
  .btn-temp{background:var(--temp-bg);color:var(--temp)}

  /* Modal */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
  .modal-overlay.open{display:flex}
  .modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:500px;padding:1.5rem;max-height:85dvh;overflow-y:auto;animation:slideUp .3s ease}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal h2{font-size:1.2rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
  .modal label{display:block;font-size:.85rem;font-weight:600;color:var(--text2);margin:1rem 0 .4rem;text-transform:uppercase;letter-spacing:.04em}
  .modal input[type="time"],.modal input[type="number"],.modal textarea{width:100%;padding:.7rem;border:2px solid var(--bg);border-radius:10px;font-size:1rem;background:var(--bg);color:var(--text);font-family:inherit}
  .modal input:focus,.modal textarea:focus{outline:none;border-color:var(--accent)}
  .modal textarea{resize:vertical;min-height:60px}
  .toggle-group{display:flex;gap:.5rem}
  .toggle-btn{flex:1;padding:.65rem .5rem;border:2px solid var(--bg);border-radius:10px;background:var(--bg);color:var(--text);font-size:.9rem;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
  .toggle-btn.active{border-color:var(--accent);background:var(--accent);color:#fff}
  .modal-actions{display:flex;gap:.75rem;margin-top:1.5rem}
  .modal-actions button{flex:1;padding:.8rem;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer}
  .btn-cancel{background:var(--bg);color:var(--text)}
  .btn-save{background:var(--accent);color:#fff}
  .btn-save:disabled{opacity:.4;cursor:not-allowed}

  /* Stopwatch */
  .stopwatch{display:flex;align-items:center;gap:.5rem;margin-top:.4rem}
  .stopwatch-display{font-size:1.6rem;font-variant-numeric:tabular-nums;font-weight:300;min-width:80px}
  .sw-btn{width:32px;height:32px;border-radius:50%;border:none;font-size:.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .sw-start{background:#34c759;color:#fff}
  .sw-pause{background:#ff9500;color:#fff}
  .sw-stop{background:var(--danger);color:#fff}
  .sw-reset{background:var(--text2);color:#fff}

  /* Entries */
  .entries{max-width:500px;margin:1rem auto;padding:0 1rem}
  .day-group{margin-bottom:1.5rem}
  .day-header{font-size:.85rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;padding:.5rem 0;border-bottom:1px solid var(--bg);cursor:pointer;display:flex;justify-content:space-between;align-items:center}
  .day-header .chevron{transition:transform .2s}
  .day-header.collapsed .chevron{transform:rotate(-90deg)}
  .day-entries{overflow:hidden}
  .day-entries.collapsed{display:none}
  .entry{display:flex;align-items:flex-start;gap:.75rem;padding:.75rem;margin:.4rem 0;border-radius:12px;background:var(--surface);box-shadow:var(--shadow);position:relative}
  .entry-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
  .entry-icon.stillen{background:var(--still-bg);color:var(--still)}
  .entry-icon.wickeln{background:var(--wickel-bg);color:var(--wickel)}
  .entry-icon.temperatur{background:var(--temp-bg);color:var(--temp)}
  .entry-body{flex:1;min-width:0}
  .entry-time{font-size:.8rem;color:var(--text2)}
  .entry-detail{font-size:.95rem;font-weight:500;margin-top:.15rem}
  .entry-notes{font-size:.8rem;color:var(--text2);margin-top:.2rem;white-space:pre-wrap;word-break:break-word}
  .entry-actions{display:flex;flex-direction:column;gap:.25rem;flex-shrink:0}
  .entry-del{background:none;border:none;color:var(--text2);cursor:pointer;font-size:1.1rem;padding:.25rem;border-radius:6px;transition:opacity .15s}
  .temp-high{color:var(--danger)!important;font-weight:700}

  /* Export & Sync bar */
  .export-bar{text-align:center;padding:1rem;display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center}
  .export-btn{background:var(--surface);border:2px solid var(--bg);border-radius:10px;padding:.6rem 1.2rem;font-size:.9rem;font-weight:600;color:var(--text);cursor:pointer;box-shadow:var(--shadow)}

  /* QR modal content */
  .qr-container{display:flex;flex-direction:column;align-items:center;gap:1rem;padding:1rem 0}
  .qr-container canvas{border-radius:12px;max-width:280px;width:100%;height:auto}
  .qr-hint{font-size:.85rem;color:var(--text2);text-align:center}
  .qr-pages{display:flex;align-items:center;gap:1rem;font-size:.9rem;font-weight:600}
  .qr-pages button{width:40px;height:40px;border-radius:50%;border:2px solid var(--bg);background:var(--surface);color:var(--text);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .qr-pages button:disabled{opacity:.3;cursor:not-allowed}

  /* Scan modal */
  .scan-container{display:flex;flex-direction:column;align-items:center;gap:1rem}
  .scan-container video{width:100%;max-width:350px;border-radius:12px;background:#000}
  .scan-status{font-size:.9rem;color:var(--text2);text-align:center;min-height:1.5em}
  .scan-success{color:#34c759;font-weight:600}
  .scan-error{color:var(--danger);font-weight:600}

  /* Dashboard */
  .dashboard-toggle{display:flex;justify-content:center;gap:.4rem;padding:.75rem 1rem 0;max-width:500px;margin:0 auto}
  .dash-tog{padding:.4rem 1rem;border:2px solid var(--bg);border-radius:10px;background:var(--bg);color:var(--text2);font-size:.85rem;font-weight:600;cursor:pointer;transition:all .15s}
  .dash-tog.active{border-color:var(--still);background:var(--still-bg);color:var(--still)}
  .dashboard{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;max-width:500px;margin:.5rem auto;padding:0 1rem}
  .mini-chart{background:var(--surface);border-radius:var(--radius);padding:.75rem;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s}
  .mini-chart:active{transform:scale(.97)}
  .mini-chart-title{font-size:.75rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.03em;margin-bottom:.4rem}
  .mini-chart canvas{width:100%!important;height:100px!important}
  .chart-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
  .chart-overlay.open{display:flex}
  .chart-full{background:var(--surface);border-radius:var(--radius);width:calc(100% - 2rem);max-width:600px;padding:1.5rem;max-height:85dvh;overflow-y:auto;animation:slideUp .3s ease}
  .chart-full h2{font-size:1.1rem;font-weight:700;margin-bottom:1rem}
  .chart-full canvas{width:100%!important;height:300px!important}
  .chart-full .btn-cancel{width:100%;margin-top:1rem;padding:.7rem;border:none;border-radius:10px;background:var(--bg);color:var(--text);font-size:1rem;font-weight:600;cursor:pointer}

  /* Stopwatch pause */
  /* sw-pause defined above with sw-btn group */
  .sw-indicator{font-size:.75rem;font-weight:700;font-variant-numeric:tabular-nums;animation:reminderBlink 1.5s ease-in-out infinite}

  /* Switch reminder */
  .switch-reminder{animation:reminderBlink 1s ease-in-out infinite;border:2px solid var(--temp)!important;border-radius:var(--radius);padding:.5rem;margin-top:.5rem;text-align:center;font-weight:600;color:var(--temp);font-size:.9rem}
  @keyframes reminderBlink{0%,100%{opacity:1}50%{opacity:.3}}
  .sw-switch-btn{margin-top:.5rem;padding:.5rem 1.2rem;border:none;border-radius:10px;background:#34c759;color:#fff;font-size:.9rem;font-weight:600;cursor:pointer}

  /* Last feed summary */
  .last-feed-summary{max-width:500px;margin:.5rem auto;padding:0 1rem}
  .last-feed-summary:empty{display:none}
  .feed-card{background:var(--surface);border-radius:var(--radius);padding:.75rem 1rem;box-shadow:var(--shadow);display:flex;flex-wrap:wrap;gap:.4rem .75rem;align-items:center;font-size:.85rem}
  .feed-card-title{font-weight:700;color:var(--still);width:100%;font-size:.75rem;text-transform:uppercase;letter-spacing:.03em}
  .feed-side{font-weight:600}
  .feed-side.last{color:var(--still);border-bottom:2px solid var(--still)}
  .feed-sep{color:var(--text2)}
  .feed-ago{color:var(--text2);font-size:.8rem;margin-left:auto}
  .entry-side-order{font-size:.75rem;color:var(--text2);margin-top:2px}

  /* Stool color reference */
  .stool-ref-btn{width:100%;padding:.7rem;border:2px solid var(--bg);border-radius:10px;background:var(--bg);color:var(--text);font-size:.9rem;font-weight:600;cursor:pointer;margin-top:.5rem;text-align:center}
  .img-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;flex-direction:column;align-items:center;justify-content:center}
  .img-overlay.open{display:flex}
  .img-overlay img{max-width:100%;max-height:80dvh;object-fit:contain;touch-action:none;transition:transform .2s ease}
  .img-overlay .img-wrap{overflow:hidden;display:flex;align-items:center;justify-content:center;width:100%;max-height:80dvh;touch-action:none}
  .img-overlay-bar{display:flex;gap:.75rem;padding:1rem}
  .img-overlay-bar button{padding:.6rem 1.2rem;border:none;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer}
  .img-bar-close{background:rgba(255,255,255,.2);color:#fff}
  .img-bar-change{background:var(--wickel);color:#fff}

  /* Edit indicator */
  .editing-badge{font-size:.7rem;background:var(--accent);color:#fff;padding:2px 8px;border-radius:8px;margin-left:.5rem}

  /* --- Device: Touch / Mobile (pointer:coarse = finger) --- */
  @media(pointer:coarse){
    .action-btn{padding:1.4rem .5rem;min-height:90px}
    .action-btn .icon{font-size:2.2rem}
    .toggle-btn{padding:.85rem .5rem;font-size:1rem;min-height:48px}
    .modal-actions button{min-height:48px;font-size:1.05rem}
    .entry-del{opacity:1;font-size:1.3rem;padding:.4rem}
    .sw-btn{width:36px;height:36px;font-size:.95rem}
  }

  /* --- Device: Mouse / Desktop (pointer:fine = mouse/trackpad) --- */
  @media(pointer:fine){
    .entry-del{opacity:0}
    .entry:hover .entry-del{opacity:1}
  }

  /* --- Small phones (<400px) --- */
  @media(max-width:399px){
    header h1{font-size:1.2rem}
    #clock{font-size:1.8rem}
    .actions{gap:.5rem;padding:.75rem}
    .action-btn{padding:1rem .4rem;font-size:.85rem}
    .action-btn .icon{font-size:1.5rem}
    .entries{padding:0 .75rem}
  }

  /* --- Tablet / small desktop (500px+) --- */
  @media(min-width:500px){
    .dashboard{max-width:500px}
    .modal{border-radius:var(--radius);margin-bottom:2rem}
    .modal-overlay{align-items:center}
  }

  /* --- Desktop (768px+) --- */
  @media(min-width:768px){
    .actions{max-width:600px;gap:1rem;padding:1.5rem}
    .action-btn{padding:1.5rem 1rem;font-size:1.05rem;border-radius:20px}
    .action-btn .icon{font-size:2rem}
    .entries{max-width:600px}
    .dashboard{max-width:600px;grid-template-columns:repeat(4,1fr)}
    .entry{padding:1rem;gap:1rem}
    .entry-icon{width:48px;height:48px;font-size:1.4rem}
    #clock{font-size:2.8rem}
    .modal{max-width:550px}
  }

  /* --- Large desktop (1200px+) --- */
  @media(min-width:1200px){
    .page-layout{display:flex;max-width:1100px;margin:0 auto;gap:2rem;padding:0 2rem;align-items:flex-start}
    .page-left{position:sticky;top:120px;flex:0 0 320px}
    .page-right{flex:1;min-width:0}
    .actions{flex-direction:column;max-width:none;padding:0}
    .action-btn{flex-direction:row;justify-content:flex-start;padding:1.2rem 1.5rem;font-size:1.05rem;gap:.75rem}
    .entries{max-width:none;padding:0}
    .export-bar{padding:1.5rem 0}
    .dashboard{max-width:none;padding:0;grid-template-columns:repeat(4,1fr)}
  }
</style>
</head>
<body>

<header>
  <h1>Baby Tracker</h1><i class="info-badge" onclick="this.classList.toggle('show')">i<span class="info-tooltip">Stand: 05.03.2026, 13:05</span></i>
  <div id="clock"></div>
</header>

<div class="page-layout">
  <div class="page-left">
    <div class="actions">
      <button class="action-btn btn-stillen" id="btnStillen" onclick="openModal('stillen')">
        <span class="icon">🤱</span>Stillen
        <span class="sw-indicator" id="swIndicator" style="display:none">⏱ <span id="swIndicatorTime">00:00</span></span>
      </button>
      <button class="action-btn btn-wickeln" onclick="openModal('wickeln')">
        <span class="icon">👶</span>Wickeln
      </button>
      <button class="action-btn btn-temp" onclick="openModal('temperatur')">
        <span class="icon">🌡️</span>Temperatur
      </button>
    </div>
    <div class="last-feed-summary" id="lastFeedSummary"></div>
    <div class="export-bar">
      <button class="export-btn" onclick="exportData()">📥 JSON</button>
      <button class="export-btn" onclick="showQR()">📤 QR teilen</button>
      <button class="export-btn" onclick="startScan()">📷 QR scannen</button>
    </div>
  </div>
  <div class="page-right">
    <div class="dashboard-toggle">
      <button class="dash-tog active" id="togWeek" onclick="setChartRange('week')">7 Tage</button>
      <button class="dash-tog" id="togMonth" onclick="setChartRange('month')">Monat</button>
    </div>
    <div class="dashboard" id="dashboard">
      <div class="mini-chart" onclick="openChart('stillzeit')">
        <div class="mini-chart-title">Stillzeit</div>
        <canvas id="miniStillzeit"></canvas>
      </div>
      <div class="mini-chart" onclick="openChart('stillpausen')">
        <div class="mini-chart-title">Stillpausen</div>
        <canvas id="miniStillpausen"></canvas>
      </div>
      <div class="mini-chart" onclick="openChart('wickel')">
        <div class="mini-chart-title">Wickeln</div>
        <canvas id="miniWickel"></canvas>
      </div>
      <div class="mini-chart" onclick="openChart('temperatur')">
        <div class="mini-chart-title">Temperatur</div>
        <canvas id="miniTemperatur"></canvas>
      </div>
    </div>
    <div class="entries" id="entries"></div>
  </div>
</div>

<!-- Stool color image overlay -->
<div class="img-overlay" id="stoolOverlay" onclick="if(event.target===this||event.target.classList.contains('img-wrap'))closeStoolImage()">
  <div class="img-wrap" id="imgWrap">
    <img id="stoolImage" src="" alt="Stuhlfarben-Referenz">
  </div>
  <div class="img-overlay-bar">
    <button class="img-bar-change" onclick="pickStoolImage()">Bild ändern</button>
    <button class="img-bar-close" onclick="closeStoolImage()">Schließen</button>
  </div>
</div>
<input type="file" id="stoolFileInput" accept="image/*" style="display:none" onchange="handleStoolFile(this)">
<input type="file" id="stoolCameraInput" accept="image/*" capture="environment" style="display:none" onchange="handleStoolFile(this)">

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

<!-- Chart overlay -->
<div class="chart-overlay" id="chartOverlay" onclick="if(event.target===this)closeChart()">
  <div class="chart-full">
    <h2 id="chartTitle"></h2>
    <canvas id="chartFull"></canvas>
    <button class="btn-cancel" onclick="closeChart()">Schließen</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="lzstring.min.js"></script>
<script src="jsqr.min.js"></script>
<script>
const STORAGE_KEY = 'baby_tracker_entries';

// --- Data ---
function loadEntries() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function saveEntries(entries) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  if (typeof Chart !== 'undefined' && typeof renderDashboard === 'function') setTimeout(renderDashboard, 100);
}
function addEntry(entry) {
  const entries = loadEntries();
  entry.id = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  entries.push(entry);
  entries.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
  saveEntries(entries);
  renderEntries();
}
function updateEntry(id, data) {
  const entries = loadEntries();
  const idx = entries.findIndex(e => e.id === id);
  if (idx >= 0) { Object.assign(entries[idx], data); saveEntries(entries); renderEntries(); }
}
function deleteEntry(id) {
  if (!confirm('Eintrag löschen?')) return;
  saveEntries(loadEntries().filter(e => e.id !== id));
  renderEntries();
}

// --- Clock ---
function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

// --- Stopwatch State (persistent) ---
const SW_KEY = 'baby_tracker_stopwatch';
let stopwatchStart = null;   // timestamp when current segment started
let stopwatchElapsed = 0;    // ms accumulated in current segment (when paused)
let swRunning = false;
let swPaused = false;
let swSide = '';              // current side being timed
let swSegments = [];          // [{side:'links', ms:123456}, ...]
let switchReminderFired = false;
let switchReminderInterval = null;

function swSaveState() {
  const state = { start: stopwatchStart, elapsed: stopwatchElapsed, running: swRunning, paused: swPaused, side: swSide, segments: swSegments, reminderFired: switchReminderFired };
  localStorage.setItem(SW_KEY, JSON.stringify(state));
}

function swLoadState() {
  try {
    const s = JSON.parse(localStorage.getItem(SW_KEY));
    if (!s) return false;
    stopwatchStart = s.start;
    stopwatchElapsed = s.elapsed || 0;
    swRunning = s.running || false;
    swPaused = s.paused || false;
    swSide = s.side || '';
    swSegments = s.segments || [];
    switchReminderFired = s.reminderFired || false;
    return swRunning || swPaused;
  } catch { return false; }
}

function swClearState() {
  localStorage.removeItem(SW_KEY);
  swRunning = false;
  swPaused = false;
  stopwatchElapsed = 0;
  stopwatchStart = null;
  swSide = '';
  swSegments = [];
}

// Get ms of current segment (running or paused)
function swCurrentSegmentMs() {
  if (swRunning && stopwatchStart) return stopwatchElapsed + (Date.now() - stopwatchStart);
  return stopwatchElapsed;
}

// Get total ms across all segments + current
function swGetTotal() {
  const prev = swSegments.reduce((s, seg) => s + seg.ms, 0);
  return prev + swCurrentSegmentMs();
}

// Get ms for current segment only (for reminder timing)
function swCurrentSegmentTotal() {
  return swCurrentSegmentMs();
}

function swFormatTime(ms) {
  const s = Math.floor(ms / 1000);
  return String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
}

// Finalize current segment into swSegments
function swFinalizeSegment() {
  const ms = swCurrentSegmentMs();
  if (ms > 0 && swSide) {
    swSegments.push({ side: swSide, ms });
  }
  stopwatchElapsed = 0;
  stopwatchStart = null;
}

// Get per-side totals from segments
function swGetSideTotals() {
  const totals = { links: 0, rechts: 0, beide: 0 };
  swSegments.forEach(seg => { if (totals.hasOwnProperty(seg.side)) totals[seg.side] += seg.ms; });
  // Add current running segment
  const cur = swCurrentSegmentMs();
  if (cur > 0 && swSide && totals.hasOwnProperty(swSide)) totals[swSide] += cur;
  return totals;
}

// Global tick — runs even when modal is closed
function swGlobalTick() {
  const total = swGetTotal();
  // Update indicator on button
  const ind = document.getElementById('swIndicator');
  const indTime = document.getElementById('swIndicatorTime');
  if (ind && indTime) {
    if (swRunning || swPaused) {
      ind.style.display = '';
      indTime.textContent = swFormatTime(total);
    } else {
      ind.style.display = 'none';
    }
  }
  // Update modal displays if open
  const display = document.getElementById('swDisplay');
  if (display) display.textContent = swFormatTime(total);
  const segDisplay = document.getElementById('swSegDisplay');
  if (segDisplay && swSide) {
    const totals = swGetSideTotals();
    const parts = [];
    if (totals.links > 0) parts.push('L: ' + swFormatTime(totals.links));
    if (totals.rechts > 0) parts.push('R: ' + swFormatTime(totals.rechts));
    if (totals.beide > 0) parts.push('Beide: ' + swFormatTime(totals.beide));
    segDisplay.textContent = parts.join(' · ');
  } else if (segDisplay) { segDisplay.textContent = ''; }
  // Switch reminder — only when stillen modal is open, based on CURRENT segment time
  if (swRunning && !switchReminderFired && document.getElementById('switchReminder')) {
    const interval = parseInt(localStorage.getItem('baby_tracker_switch_interval'));
    if (interval && swCurrentSegmentMs() >= interval * 60000) {
      switchReminderFired = true;
      startSwitchReminder();
    }
  }
}

// Start global ticker
setInterval(swGlobalTick, 250);

// Restore on page load
if (swLoadState()) {
  swGlobalTick();
}

// --- Modal ---
let currentType = null;
let editingId = null;

function openModal(type, existingEntry) {
  currentType = type;
  editingId = existingEntry ? existingEntry.id : null;
  const now = new Date();
  const timeStr = existingEntry
    ? new Date(existingEntry.timestamp).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }).replace(/^(\d):/, '0$1:')
    : now.toTimeString().slice(0, 5);

  const accentMap = { stillen: 'var(--still)', wickeln: 'var(--wickel)', temperatur: 'var(--temp)' };
  const iconMap = { stillen: '🤱', wickeln: '👶', temperatur: '🌡️' };
  const titleMap = { stillen: 'Stillen', wickeln: 'Wickeln', temperatur: 'Temperatur' };
  document.getElementById('modal').style.setProperty('--accent', accentMap[type]);

  let html = `<h2>${iconMap[type]} ${titleMap[type]}${editingId ? '<span class="editing-badge">Bearbeiten</span>' : ''}</h2>`;
  html += `<label>Uhrzeit</label><input type="time" id="mTime" value="${timeStr}">`;

  if (type === 'stillen') {
    const hasActive = swRunning || swPaused;
    const dur = existingEntry ? existingEntry.durationMin || '' : (hasActive ? Math.round(swGetTotal() / 60000) || '' : '');
    const side = existingEntry ? existingEntry.side : (hasActive ? swSide : '');
    const showStart = !hasActive ? '' : 'display:none';
    const showPause = hasActive ? '' : 'display:none';
    const showStop = hasActive ? '' : 'display:none';
    const pauseLabel = (hasActive && swPaused) ? '▶' : '⏸';
    const swTime = hasActive ? swFormatTime(swGetTotal()) : '00:00';
    // Segment summary
    let segSummary = '';
    if (hasActive && swSegments.length > 0) {
      const totals = swGetSideTotals();
      const parts = [];
      if (totals.links > 0) parts.push('L: ' + Math.round(totals.links / 60000) + ' Min');
      if (totals.rechts > 0) parts.push('R: ' + Math.round(totals.rechts / 60000) + ' Min');
      if (totals.beide > 0) parts.push('Beide: ' + Math.round(totals.beide / 60000) + ' Min');
      segSummary = parts.join(' · ');
    }
    html += `
      <label>Dauer (Minuten)</label>
      <div class="stopwatch">
        <input type="number" id="mDuration" min="0" max="120" placeholder="z.B. 15" value="${dur}" style="flex:1">
        <button class="sw-btn sw-start" id="swBtn" onclick="swStart()" style="${showStart}">▶</button>
        <button class="sw-btn ${swPaused ? 'sw-start' : 'sw-pause'}" id="swPauseBtn" onclick="${swPaused ? 'swResume()' : 'swPause()'}" style="${showPause}">${pauseLabel}</button>
        <button class="sw-btn sw-stop" id="swStopBtn" onclick="swStop()" style="${showStop}">■</button>
        <button class="sw-btn sw-reset" id="swResetBtn" onclick="swResetCurrentSegment()" style="${showStop}" title="Aktuelle Seite zurücksetzen">↺</button>
        <span class="stopwatch-display" id="swDisplay">${swTime}</span>
      </div>
      <div id="swSegDisplay" style="font-size:.8rem;color:var(--text2);margin-top:.3rem;font-variant-numeric:tabular-nums"></div>
      ${segSummary ? `<div style="font-size:.8rem;color:var(--still);margin-top:.2rem;font-weight:600">${segSummary}</div>` : ''}
      <div id="switchReminder"></div>
      <label>Wechsel-Intervall (Min, optional)</label>
      <input type="number" id="mSwitchInterval" min="1" max="60" placeholder="z.B. 20" value="${localStorage.getItem('baby_tracker_switch_interval') || '20'}">
      <label>Brustseite</label>
      <div class="toggle-group">
        <button class="toggle-btn${side==='links'?' active':''}" data-val="links" onclick="pickToggle(this,'mSide')">Links</button>
        <button class="toggle-btn${side==='rechts'?' active':''}" data-val="rechts" onclick="pickToggle(this,'mSide')">Rechts</button>
        <button class="toggle-btn${side==='beide'?' active':''}" data-val="beide" onclick="pickToggle(this,'mSide')">Beide</button>
        <button class="toggle-btn" id="swSwitchBtn" onclick="swManualSwitch()" ${hasActive && swPaused ? '' : 'disabled'} style="background:var(--still-bg);color:var(--still);${hasActive ? '' : 'display:none'}">🔄 Wechsel</button>
      </div>
      <input type="hidden" id="mSide" value="${side}">`;
  } else if (type === 'wickeln') {
    const dt = existingEntry ? existingEntry.diaperType : '';
    const wtv = existingEntry && existingEntry.tempValue ? existingEntry.tempValue : '';
    html += `
      <label>Art</label>
      <div class="toggle-group">
        <button class="toggle-btn${dt==='nass'?' active':''}" data-val="nass" onclick="pickToggle(this,'mDiaperType')">💧 Nass</button>
        <button class="toggle-btn${dt==='stuhl'?' active':''}" data-val="stuhl" onclick="pickToggle(this,'mDiaperType')">💩 Stuhl</button>
        <button class="toggle-btn${dt==='beides'?' active':''}" data-val="beides" onclick="pickToggle(this,'mDiaperType')">💧💩 Beides</button>
      </div>
      <input type="hidden" id="mDiaperType" value="${dt}">
      <label>Temperatur (°C, optional)</label>
      <input type="number" id="mWickelTemp" min="34" max="42" step="0.1" placeholder="z.B. 37.2" value="${wtv}">
      <button class="stool-ref-btn" onclick="openStoolRef()">🎨 Stuhlfarben-Referenz</button>`;
  } else {
    const tv = existingEntry ? existingEntry.tempValue : '';
    html += `<label>Temperatur (°C)</label><input type="number" id="mTemp" min="34" max="42" step="0.1" placeholder="z.B. 37.2" value="${tv}">`;
  }

  const notes = existingEntry ? (existingEntry.notes || '') : '';
  html += `<label>Notizen (optional)</label><textarea id="mNotes" placeholder="Anmerkungen...">${notes}</textarea>`;
  html += `<div class="modal-actions">
    <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
    <button class="btn-save" onclick="saveModal()">${editingId ? 'Speichern' : 'Eintragen'}</button>
  </div>`;

  document.getElementById('modal').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  // Reset stopwatch when closing stillen modal
  if (currentType === 'stillen') {
    clearSwitchReminder();
    swClearState();
  }
  document.getElementById('modalOverlay').classList.remove('open');
  currentType = null;
  editingId = null;
}

function pickToggle(btn, hiddenId) {
  btn.parentElement.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(hiddenId).value = btn.dataset.val;
}

function saveModal() {
  const timeVal = document.getElementById('mTime').value;
  const now = new Date();
  const [h, m] = timeVal.split(':').map(Number);
  const ts = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m);
  // If editing, preserve original date
  if (editingId) {
    const entries = loadEntries();
    const orig = entries.find(e => e.id === editingId);
    if (orig) {
      const origDate = new Date(orig.timestamp);
      ts.setFullYear(origDate.getFullYear(), origDate.getMonth(), origDate.getDate());
    }
  }
  const notes = document.getElementById('mNotes').value.trim() || undefined;

  let data = { type: currentType, timestamp: ts.toISOString(), notes };

  if (currentType === 'stillen') {
    const dur = parseInt(document.getElementById('mDuration').value);
    const side = document.getElementById('mSide').value;
    if (!side) { alert('Bitte Brustseite wählen'); return; }
    data.durationMin = isNaN(dur) ? 0 : dur;
    data.side = side;
    // Store per-side breakdown if segments exist
    if (swSegments.length > 0) {
      const totals = { links: 0, rechts: 0, beide: 0 };
      swSegments.forEach(seg => { if (totals.hasOwnProperty(seg.side)) totals[seg.side] += seg.ms; });
      data.durationLinks = Math.round(totals.links / 60000);
      data.durationRechts = Math.round(totals.rechts / 60000);
      if (totals.beide > 0) data.durationBeide = Math.round(totals.beide / 60000);
      if (data.durationLinks > 0 && data.durationRechts > 0) data.side = 'beide';
      // Store the actual order of sides used (deduplicate consecutive same-side segments)
      const sideOrder = [];
      swSegments.forEach(seg => {
        if (sideOrder.length === 0 || sideOrder[sideOrder.length - 1] !== seg.side) {
          sideOrder.push(seg.side);
        }
      });
      if (sideOrder.length > 1) data.sideOrder = sideOrder;
    }
    // Clear stopwatch after saving
    clearSwitchReminder();
    swClearState();
  } else if (currentType === 'wickeln') {
    const dt = document.getElementById('mDiaperType').value;
    if (!dt) { alert('Bitte Art wählen'); return; }
    data.diaperType = dt;
    const wtv = parseFloat(document.getElementById('mWickelTemp').value);
    if (!isNaN(wtv)) data.tempValue = wtv;
  } else {
    const tv = parseFloat(document.getElementById('mTemp').value);
    if (isNaN(tv)) { alert('Bitte Temperatur eingeben'); return; }
    data.tempValue = tv;
  }

  if (editingId) {
    updateEntry(editingId, data);
  } else {
    addEntry(data);
  }
  closeModal();
}

// --- Stopwatch ---
function swUpdateModalUI() {
  const btn = document.getElementById('swBtn');
  const pauseBtn = document.getElementById('swPauseBtn');
  const stopBtn = document.getElementById('swStopBtn');
  const resetBtn = document.getElementById('swResetBtn');
  if (!btn) return; // modal not open
  if (swRunning || swPaused) {
    btn.style.display = 'none';
    pauseBtn.style.display = '';
    stopBtn.style.display = '';
    if (resetBtn) resetBtn.style.display = '';
    pauseBtn.textContent = swPaused ? '▶' : '⏸';
    pauseBtn.className = 'sw-btn ' + (swPaused ? 'sw-start' : 'sw-pause');
    pauseBtn.onclick = swPaused ? swResume : swPause;
  } else {
    btn.style.display = '';
    pauseBtn.style.display = 'none';
    stopBtn.style.display = 'none';
    if (resetBtn) resetBtn.style.display = 'none';
  }
  // Update side toggles to match current swSide
  const sideEl = document.getElementById('mSide');
  if (sideEl && (swRunning || swPaused)) {
    sideEl.value = swSide;
    const btns = sideEl.parentElement.querySelectorAll('.toggle-btn[data-val]');
    btns.forEach(b => b.classList.toggle('active', b.dataset.val === swSide));
  }
  // Enable switch button only when paused
  const switchBtn = document.getElementById('swSwitchBtn');
  if (switchBtn) {
    switchBtn.disabled = !swPaused;
    switchBtn.style.display = (swRunning || swPaused) ? '' : 'none';
  }
}

function swSwitchSideUI(newSide) {
  const sideInput = document.getElementById('mSide');
  if (sideInput) {
    const btns = sideInput.parentElement.querySelectorAll('.toggle-btn');
    btns.forEach(b => b.classList.toggle('active', b.dataset.val === newSide));
    sideInput.value = newSide;
  }
  swSide = newSide;
}

function swStart() {
  // Save side
  const sideEl = document.getElementById('mSide');
  if (sideEl) swSide = sideEl.value;
  if (!swSide) { alert('Bitte Brustseite wählen'); return; }
  // Save switch interval
  const si = document.getElementById('mSwitchInterval');
  if (si) {
    const v = parseInt(si.value);
    if (!isNaN(v) && v > 0) localStorage.setItem('baby_tracker_switch_interval', v);
    else localStorage.removeItem('baby_tracker_switch_interval');
  }
  // Adopt manual duration as initial segment if present
  swSegments = [];
  const manualDur = parseInt(document.getElementById('mDuration').value);
  if (!isNaN(manualDur) && manualDur > 0) {
    swSegments.push({ side: swSide, ms: manualDur * 60000 });
  }
  stopwatchStart = Date.now();
  stopwatchElapsed = 0;
  swRunning = true;
  swPaused = false;
  switchReminderFired = false;
  clearSwitchReminder();
  swSaveState();
  swUpdateModalUI();
}

function swPause() {
  if (swRunning) {
    stopwatchElapsed += Date.now() - stopwatchStart;
    swRunning = false;
    swPaused = true;
    swSaveState();
    swUpdateModalUI();
  }
  clearSwitchReminder();
}

function swResume() {
  stopwatchStart = Date.now();
  swRunning = true;
  swPaused = false;
  switchReminderFired = false;
  clearSwitchReminder();
  swSaveState();
  swUpdateModalUI();
}

function swRestoreFromEntry(entry) {
  // Reconstruct stopwatch state from a saved stillen entry so user can resume
  swSegments = [];
  if (entry.sideOrder && entry.sideOrder.length > 0) {
    // Reconstruct segments from sideOrder and per-side totals
    const sideTotals = { links: (entry.durationLinks || 0) * 60000, rechts: (entry.durationRechts || 0) * 60000, beide: (entry.durationBeide || 0) * 60000 };
    const sideCount = {};
    entry.sideOrder.forEach(s => { sideCount[s] = (sideCount[s] || 0) + 1; });
    entry.sideOrder.forEach(s => {
      const ms = Math.round(sideTotals[s] / sideCount[s]);
      if (ms > 0) swSegments.push({ side: s, ms });
    });
  } else if (entry.durationLinks > 0 || entry.durationRechts > 0) {
    if (entry.durationLinks > 0) swSegments.push({ side: 'links', ms: entry.durationLinks * 60000 });
    if (entry.durationRechts > 0) swSegments.push({ side: 'rechts', ms: entry.durationRechts * 60000 });
    if (entry.durationBeide > 0) swSegments.push({ side: 'beide', ms: entry.durationBeide * 60000 });
  } else if (entry.durationMin > 0) {
    swSegments.push({ side: entry.side || 'beide', ms: entry.durationMin * 60000 });
  }
  // Set to paused state on last used side
  swSide = entry.sideOrder ? entry.sideOrder[entry.sideOrder.length - 1] : entry.side;
  swRunning = false;
  swPaused = true;
  stopwatchStart = null;
  stopwatchElapsed = 0;
  swSaveState();
}

function swResetCurrentSegment() {
  // Reset current segment timer but keep previously recorded segments
  stopwatchElapsed = 0;
  if (swRunning) {
    stopwatchStart = Date.now();
  }
  switchReminderFired = false;
  clearSwitchReminder();
  swSaveState();
}

function swManualSwitch() {
  if (!swPaused) return;
  // Finalize current segment
  swFinalizeSegment();
  // Switch side
  const newSide = swSide === 'links' ? 'rechts' : 'links';
  swSwitchSideUI(newSide);
  // Stay paused — user must press Start to continue
  stopwatchStart = null;
  stopwatchElapsed = 0;
  swSaveState();
  swUpdateModalUI();
}

function swStop() {
  if (swRunning) {
    stopwatchElapsed += Date.now() - stopwatchStart;
  }
  // Finalize current segment
  swFinalizeSegment();
  // Set duration to total
  const dur = document.getElementById('mDuration');
  const totalMs = swSegments.reduce((s, seg) => s + seg.ms, 0);
  if (dur) dur.value = Math.round(totalMs / 60000);
  // Update side to reflect what was used
  if (swSegments.length > 0) {
    const sides = [...new Set(swSegments.map(s => s.side))];
    if (sides.length > 1) swSwitchSideUI('beide');
    else swSwitchSideUI(sides[0]);
  }
  clearSwitchReminder();
  // Keep segments for saveModal, but stop running
  swRunning = false;
  swPaused = false;
  stopwatchElapsed = 0;
  stopwatchStart = null;
  swSaveState();
  swUpdateModalUI();
}


function swSwitchBreast() {
  // Called from reminder button — pause, finalize segment, switch side
  if (swRunning) {
    stopwatchElapsed += Date.now() - stopwatchStart;
    swRunning = false;
    swPaused = true;
  }
  swFinalizeSegment();
  const newSide = swSide === 'links' ? 'rechts' : 'links';
  swSwitchSideUI(newSide);
  stopwatchStart = null;
  stopwatchElapsed = 0;
  switchReminderFired = false;
  clearSwitchReminder();
  swSaveState();
  swUpdateModalUI();
}

function playBeep() {
  if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    osc.type = 'sine';
    gain.gain.value = 0.3;
    osc.start();
    osc.stop(ctx.currentTime + 0.4);
    setTimeout(() => {
      const osc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.connect(gain2);
      gain2.connect(ctx.destination);
      osc2.frequency.value = 1100;
      osc2.type = 'sine';
      gain2.gain.value = 0.3;
      osc2.start();
      osc2.stop(ctx.currentTime + 0.4);
    }, 500);
  } catch (e) {}
}

function startSwitchReminder() {
  const rem = document.getElementById('switchReminder');
  if (rem) rem.innerHTML = '<div class="switch-reminder">🔄 Brustwechsel!<br><button class="sw-switch-btn" onclick="swSwitchBreast()">🔄 Brust wechseln</button></div>';
  playBeep();
  switchReminderInterval = setInterval(playBeep, 10000);
}

function clearSwitchReminder() {
  if (switchReminderInterval) { clearInterval(switchReminderInterval); switchReminderInterval = null; }
  const rem = document.getElementById('switchReminder');
  if (rem) rem.innerHTML = '';
}


// --- Render entries ---
function renderLastFeedSummary() {
  const el = document.getElementById('lastFeedSummary');
  if (!el) return;
  const entries = loadEntries();
  const last = entries.find(e => e.type === 'stillen');
  if (!last) { el.innerHTML = ''; return; }

  // Per-side info
  const linksMin = last.durationLinks || (last.side === 'links' ? last.durationMin : 0) || 0;
  const rechtsMin = last.durationRechts || (last.side === 'rechts' ? last.durationMin : 0) || 0;
  const beideMin = last.durationBeide || (last.side === 'beide' && !last.durationLinks ? last.durationMin : 0) || 0;

  // Determine which side was last (last segment = last side used)
  let lastSide = last.side;
  if (last.sideOrder && last.sideOrder.length > 0) {
    lastSide = last.sideOrder[last.sideOrder.length - 1];
  } else if (last.durationLinks > 0 && last.durationRechts > 0) {
    lastSide = 'rechts';
  }

  // Time ago
  const agoMs = Date.now() - new Date(last.timestamp).getTime();
  const agoH = Math.floor(agoMs / 3600000);
  const agoM = Math.floor((agoMs % 3600000) / 60000);
  let agoStr = '';
  if (agoH > 0) agoStr = `vor ${agoH}h ${agoM}min`;
  else agoStr = `vor ${agoM} min`;

  let parts = '';
  if (linksMin > 0) parts += `<span class="feed-side${lastSide === 'links' ? ' last' : ''}">L: ${linksMin} Min</span>`;
  if (linksMin > 0 && rechtsMin > 0) parts += `<span class="feed-sep">·</span>`;
  if (rechtsMin > 0) parts += `<span class="feed-side${lastSide === 'rechts' ? ' last' : ''}">R: ${rechtsMin} Min</span>`;
  if (beideMin > 0) parts += `<span class="feed-side${lastSide === 'beide' ? ' last' : ''}">Beide: ${beideMin} Min</span>`;
  if (!parts) parts = `<span class="feed-side last">${last.side ? last.side.charAt(0).toUpperCase() + last.side.slice(1) : '?'}: ${last.durationMin || 0} Min</span>`;

  el.innerHTML = `<div class="feed-card">
    <div class="feed-card-title">🤱 Letzte Stillzeit</div>
    ${parts}
    <span class="feed-ago">${agoStr}</span>
    <span class="feed-sep">→ Nächste Seite: <strong>${lastSide === 'links' ? 'Links' : lastSide === 'rechts' ? 'Rechts' : 'Links'}</strong></span>
  </div>`;
}

function renderEntries() {
  renderLastFeedSummary();
  const entries = loadEntries();
  const container = document.getElementById('entries');
  if (!entries.length) { container.innerHTML = '<p style="text-align:center;color:var(--text2);padding:2rem">Noch keine Einträge</p>'; return; }

  // Group by day
  const days = {};
  entries.forEach(e => {
    const d = new Date(e.timestamp);
    const key = d.toISOString().slice(0, 10);
    (days[key] = days[key] || []).push(e);
  });

  const today = new Date().toISOString().slice(0, 10);
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  const sortedDays = Object.keys(days).sort().reverse();

  let html = '';
  sortedDays.forEach((day, i) => {
    let label = new Date(day + 'T00:00').toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' });
    if (day === today) label = 'Heute — ' + label;
    else if (day === yesterday) label = 'Gestern — ' + label;
    const collapsed = i > 0 ? ' collapsed' : '';

    html += `<div class="day-group">
      <div class="day-header${collapsed}" onclick="this.classList.toggle('collapsed');this.nextElementSibling.classList.toggle('collapsed')">
        ${label} <span class="chevron">▼</span>
      </div>
      <div class="day-entries${collapsed}">`;

    days[day].forEach(e => {
      const time = new Date(e.timestamp).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
      let detail = '', iconClass = e.type;
      const iconSymbols = { stillen: '🤱', wickeln: '👶', temperatur: '🌡️' };

      if (e.type === 'stillen') {
        if (e.durationLinks > 0 || e.durationRechts > 0) {
          const parts = [];
          if (e.durationLinks > 0) parts.push('L: ' + e.durationLinks + ' Min');
          if (e.durationRechts > 0) parts.push('R: ' + e.durationRechts + ' Min');
          detail = parts.join(' · ');
          if (e.durationMin) detail += ` (${e.durationMin} Min ges.)`;
        } else {
          const sideMap = { links: 'Links', rechts: 'Rechts', beide: 'Beide Seiten' };
          detail = `${sideMap[e.side] || e.side}`;
          if (e.durationMin) detail += ` · ${e.durationMin} Min`;
        }
        if (e.side === 'beide' && e.sideOrder && e.sideOrder.length > 1) {
          const orderMap = { links: 'L', rechts: 'R', beide: 'B' };
          detail += `<div class="entry-side-order">Reihenfolge: ${e.sideOrder.map(s => orderMap[s] || s).join(' → ')}</div>`;
        }
      } else if (e.type === 'wickeln') {
        const dtMap = { nass: '💧 Nass', stuhl: '💩 Stuhl', beides: '💧💩 Beides' };
        detail = dtMap[e.diaperType] || e.diaperType;
        if (e.tempValue) {
          const high = e.tempValue >= 38;
          detail += ` · <span class="${high ? 'temp-high' : ''}">${e.tempValue} °C</span>`;
        }
      } else {
        const high = e.tempValue >= 38;
        detail = `<span class="${high ? 'temp-high' : ''}">${e.tempValue} °C</span>`;
      }

      html += `<div class="entry">
        <div class="entry-icon ${iconClass}">${iconSymbols[e.type]}</div>
        <div class="entry-body">
          <div class="entry-time">${time}</div>
          <div class="entry-detail">${detail}</div>
          ${e.notes ? `<div class="entry-notes">${escHtml(e.notes)}</div>` : ''}
        </div>
        <div class="entry-actions">
          <button class="entry-del" title="Bearbeiten" onclick="editEntry('${e.id}')">✏️</button>
          <button class="entry-del" title="Löschen" onclick="deleteEntry('${e.id}')">🗑️</button>
        </div>
      </div>`;
    });

    html += '</div></div>';
  });

  container.innerHTML = html;
}

function editEntry(id) {
  const entry = loadEntries().find(e => e.id === id);
  if (!entry) return;
  // For stillen entries: restore stopwatch state so user can resume live session
  if (entry.type === 'stillen' && (entry.durationMin > 0 || entry.durationLinks > 0 || entry.durationRechts > 0)) {
    swRestoreFromEntry(entry);
  }
  openModal(entry.type, entry);
}

function handleStoolFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    // Resize to save localStorage space
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const maxSize = 1200;
      let w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
        else { w = Math.round(w * maxSize / h); h = maxSize; }
      }
      canvas.width = w;
      canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
      try {
        localStorage.setItem(STOOL_IMG_KEY, dataUrl);
        showStoolImage(dataUrl);
      } catch (e) {
        alert('Bild zu groß für den Speicher. Bitte ein kleineres Bild wählen.');
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// --- Image zoom (pinch + double-tap) ---
let imgScale = 1, imgX = 0, imgY = 0;
let imgPinchStartDist = 0, imgPinchStartScale = 1;
let imgPanStartX = 0, imgPanStartY = 0, imgPanStartImgX = 0, imgPanStartImgY = 0;
let imgLastTap = 0;

function imgZoomReset() {
  imgScale = 1; imgX = 0; imgY = 0;
  const img = document.getElementById('stoolImage');
  if (img) img.style.transform = '';
}

function imgApplyTransform() {
  const img = document.getElementById('stoolImage');
  if (img) img.style.transform = `translate(${imgX}px, ${imgY}px) scale(${imgScale})`;
}

function imgClampPan() {
  if (imgScale <= 1) { imgX = 0; imgY = 0; return; }
  const img = document.getElementById('stoolImage');
  if (!img) return;
  const r = img.getBoundingClientRect();
  const wrap = document.getElementById('imgWrap');
  if (!wrap) return;
  const wr = wrap.getBoundingClientRect();
  const maxX = Math.max(0, (r.width - wr.width) / 2);
  const maxY = Math.max(0, (r.height - wr.height) / 2);
  imgX = Math.max(-maxX, Math.min(maxX, imgX));
  imgY = Math.max(-maxY, Math.min(maxY, imgY));
}

(function initImgZoom() {
  document.addEventListener('DOMContentLoaded', () => {
    const wrap = document.getElementById('imgWrap');
    if (!wrap) return;

    wrap.addEventListener('dblclick', e => {
      e.preventDefault();
      if (imgScale > 1) { imgZoomReset(); } else { imgScale = 3; imgX = 0; imgY = 0; }
      imgApplyTransform();
    });

    wrap.addEventListener('touchstart', e => {
      if (e.touches.length === 1) {
        // Double-tap detection
        const now = Date.now();
        if (now - imgLastTap < 300) {
          e.preventDefault();
          if (imgScale > 1) { imgZoomReset(); } else { imgScale = 3; imgX = 0; imgY = 0; }
          imgApplyTransform();
        }
        imgLastTap = now;
        // Pan start
        imgPanStartX = e.touches[0].clientX;
        imgPanStartY = e.touches[0].clientY;
        imgPanStartImgX = imgX;
        imgPanStartImgY = imgY;
      }
      if (e.touches.length === 2) {
        e.preventDefault();
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        imgPinchStartDist = Math.hypot(dx, dy);
        imgPinchStartScale = imgScale;
      }
    }, { passive: false });

    wrap.addEventListener('touchmove', e => {
      if (e.touches.length === 2) {
        e.preventDefault();
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.hypot(dx, dy);
        imgScale = Math.max(1, Math.min(8, imgPinchStartScale * (dist / imgPinchStartDist)));
        imgClampPan();
        imgApplyTransform();
      } else if (e.touches.length === 1 && imgScale > 1) {
        e.preventDefault();
        imgX = imgPanStartImgX + (e.touches[0].clientX - imgPanStartX);
        imgY = imgPanStartImgY + (e.touches[0].clientY - imgPanStartY);
        imgClampPan();
        imgApplyTransform();
      }
    }, { passive: false });

    wrap.addEventListener('touchend', () => {
      if (imgScale <= 1) imgZoomReset();
      imgApplyTransform();
    });

    // Mouse wheel zoom for desktop
    wrap.addEventListener('wheel', e => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? 0.8 : 1.25;
      imgScale = Math.max(1, Math.min(8, imgScale * delta));
      if (imgScale <= 1) { imgX = 0; imgY = 0; }
      imgClampPan();
      imgApplyTransform();
    }, { passive: false });
  });
})();

// --- QR Sync ---
const QR_MAX_BYTES = 400; // small chunks = sparse QR = reliable camera scanning

function mergeEntries(local, remote) {
  const map = new Map(local.map(e => [e.id, e]));
  let added = 0;
  for (const r of remote) {
    if (!map.has(r.id)) { added++; }
    map.set(r.id, r);
  }
  const merged = [...map.values()].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
  return { merged, added };
}

function chunkDataForQR(entries) {
  const json = JSON.stringify(entries);
  const compressed = LZString.compressToEncodedURIComponent(json);
  const chunks = [];
  for (let i = 0; i < compressed.length; i += QR_MAX_BYTES) {
    chunks.push(compressed.slice(i, i + QR_MAX_BYTES));
  }
  return chunks;
}

let qrChunks = [];
let qrPage = 0;

function showQR() {
  const entries = loadEntries();
  if (!entries.length) { alert('Keine Daten zum Teilen'); return; }
  qrChunks = chunkDataForQR(entries);
  qrPage = 0;
  renderQRModal();
}

function renderQRModal() {
  const total = qrChunks.length;
  const payload = `BT:${qrPage + 1}/${total}:${qrChunks[qrPage]}`;

  let html = `<h2>📤 QR-Code teilen</h2><div class="qr-container">`;
  html += `<div id="qrCanvas" style="display:inline-block"></div>`;
  if (total > 1) {
    html += `<div class="qr-pages">
      <button onclick="qrPrev()" ${qrPage === 0 ? 'disabled' : ''}>◀</button>
      <span>Seite ${qrPage + 1} von ${total}</span>
      <button onclick="qrNext()" ${qrPage === total - 1 ? 'disabled' : ''}>▶</button>
    </div>
    <p class="qr-hint">Alle ${total} QR-Codes nacheinander scannen</p>`;
  } else {
    html += `<p class="qr-hint">Auf dem anderen Gerät scannen</p>`;
  }
  html += `</div><div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Schließen</button></div>`;

  document.getElementById('modal').style.setProperty('--accent', 'var(--still)');
  document.getElementById('modal').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');

  // Render QR code using qrcodejs library
  setTimeout(() => {
    const container = document.getElementById('qrCanvas');
    new QRCode(container, {
      text: payload,
      width: 300,
      height: 300,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  }, 50);
}

function qrPrev() { if (qrPage > 0) { qrPage--; renderQRModal(); } }
function qrNext() { if (qrPage < qrChunks.length - 1) { qrPage++; renderQRModal(); } }

// --- QR Scanner (jsQR — works in all browsers) ---
let scanStream = null;
let scanAnimFrame = null;
let scanCanvas = null;
let scanCtx = null;
let receivedChunks = {};
let expectedTotal = 0;

function startScan() {
  receivedChunks = {};
  expectedTotal = 0;

  let html = `<h2>📷 QR-Code scannen</h2>
    <div class="scan-container">
      <video id="scanVideo" autoplay playsinline muted style="display:none"></video>
      <canvas id="scanCanvas" style="width:100%;max-width:350px;border-radius:12px"></canvas>
      <p class="scan-status" id="scanStatus">Kamera wird gestartet...</p>
      <p class="scan-status" id="scanDebug" style="font-size:.7rem;color:var(--text2);margin-top:.3rem"></p>
    </div>
    <div class="modal-actions"><button class="btn-cancel" onclick="stopScan();closeModal()">Abbrechen</button></div>`;

  document.getElementById('modal').style.setProperty('--accent', 'var(--wickel)');
  document.getElementById('modal').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');

  scanCanvas = document.getElementById('scanCanvas');
  scanCtx = scanCanvas.getContext('2d', { willReadFrequently: true });

  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } })
    .then(stream => {
      scanStream = stream;
      const video = document.getElementById('scanVideo');
      if (!video) { stopScan(); return; }
      video.srcObject = stream;
      video.play();
      video.addEventListener('loadedmetadata', () => {
        scanCanvas.width = video.videoWidth;
        scanCanvas.height = video.videoHeight;
        document.getElementById('scanStatus').textContent = 'QR-Code vor die Kamera halten...';
        const dbg = document.getElementById('scanDebug');
        if (dbg) dbg.textContent = `Video: ${video.videoWidth}x${video.videoHeight} | Detector: ${barcodeDetector ? 'native' : 'jsQR'}`;
        scanLoop();
      });
    })
    .catch(err => {
      const status = document.getElementById('scanStatus');
      if (status) {
        status.className = 'scan-status scan-error';
        status.textContent = 'Kamera-Zugriff verweigert: ' + err.message;
      }
    });
}

let barcodeDetector = null;
let scanBusy = false;
if ('BarcodeDetector' in window) {
  barcodeDetector = new BarcodeDetector({ formats: ['qr_code'] });
}

function handleScanData(data) {
  if (!data) return;
  if (!data.startsWith('BT:')) {
    const status = document.getElementById('scanStatus');
    if (status) status.textContent = 'QR erkannt, aber kein Baby-Tracker-Code. Richtigen QR zeigen...';
    return;
  }
  processScanResult(data);
}

let scanFrameCount = 0;

function scanLoop() {
  const video = document.getElementById('scanVideo');
  if (!video || !scanStream || video.readyState < 2) {
    if (scanStream) scanAnimFrame = requestAnimationFrame(scanLoop);
    return;
  }

  scanCtx.drawImage(video, 0, 0, scanCanvas.width, scanCanvas.height);
  scanFrameCount++;

  const dbg = document.getElementById('scanDebug');

  // Try native BarcodeDetector on video element directly
  if (barcodeDetector && !scanBusy) {
    scanBusy = true;
    barcodeDetector.detect(video).then(codes => {
      scanBusy = false;
      if (codes.length > 0) {
        if (dbg) dbg.textContent = `Native erkannt: ${codes[0].rawValue.substring(0, 40)}...`;
        handleScanData(codes[0].rawValue);
      }
    }).catch(() => { scanBusy = false; });
  }

  // Always also try jsQR as second detector
  const imageData = scanCtx.getImageData(0, 0, scanCanvas.width, scanCanvas.height);
  const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'attemptBoth' });

  if (dbg && scanFrameCount % 30 === 0) {
    dbg.textContent = `Frames: ${scanFrameCount} | native: ${barcodeDetector ? 'ja' : 'nein'} | jsQR: ${code ? 'ja' : 'nein'} | ${scanCanvas.width}x${scanCanvas.height}`;
  }

  if (code && code.data) {
    if (dbg) dbg.textContent = `jsQR erkannt: ${code.data.substring(0, 40)}...`;
    handleScanData(code.data);
  }

  if (scanStream) scanAnimFrame = requestAnimationFrame(scanLoop);
}

function processScanResult(raw) {
  if (!raw.startsWith('BT:')) return;
  const match = raw.match(/^BT:(\d+)\/(\d+):(.+)$/);
  if (!match) return;

  const page = parseInt(match[1]);
  const total = parseInt(match[2]);
  const data = match[3];
  expectedTotal = total;
  receivedChunks[page] = data;

  const received = Object.keys(receivedChunks).length;
  const status = document.getElementById('scanStatus');

  if (received < total) {
    status.className = 'scan-status';
    status.textContent = `${received} von ${total} QR-Codes gescannt — nächsten zeigen...`;
    return;
  }

  // All chunks received — merge
  let compressed = '';
  for (let i = 1; i <= total; i++) compressed += receivedChunks[i];

  try {
    const json = LZString.decompressFromEncodedURIComponent(compressed);
    const remote = JSON.parse(json);
    const local = loadEntries();
    const { merged, added } = mergeEntries(local, remote);
    saveEntries(merged);
    renderEntries();

    status.className = 'scan-status scan-success';
    status.textContent = `Sync erfolgreich! ${added} neue Einträge hinzugefügt. Gesamt: ${merged.length}`;
    stopScan();
  } catch (e) {
    status.className = 'scan-status scan-error';
    status.textContent = 'Fehler beim Verarbeiten der Daten';
  }
}

function stopScan() {
  if (scanAnimFrame) cancelAnimationFrame(scanAnimFrame);
  scanAnimFrame = null;
  if (scanStream) {
    scanStream.getTracks().forEach(t => t.stop());
    scanStream = null;
  }
  scanCanvas = null;
  scanCtx = null;
}

// --- Dashboard Charts ---
const miniCharts = {};
let fullChart = null;
let chartRange = 'week'; // 'week' or 'month'

function setChartRange(range) {
  chartRange = range;
  document.getElementById('togWeek').classList.toggle('active', range === 'week');
  document.getElementById('togMonth').classList.toggle('active', range === 'month');
  renderDashboard();
}

function getChartDays() {
  if (chartRange === 'month') {
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const days = [];
    for (let d = 1; d <= daysInMonth; d++) {
      days.push(new Date(year, month, d).toISOString().slice(0, 10));
    }
    return days;
  }
  const days = [];
  for (let i = 6; i >= 0; i--) {
    days.push(new Date(Date.now() - i * 86400000).toISOString().slice(0, 10));
  }
  return days;
}

function dayLabel(iso) {
  const d = new Date(iso + 'T12:00');
  return chartRange === 'month'
    ? d.toLocaleDateString('de-DE', { day: 'numeric' })
    : d.toLocaleDateString('de-DE', { weekday: 'short', day: 'numeric' });
}

function rangeTitle() {
  if (chartRange === 'month') return new Date().toLocaleDateString('de-DE', { month: 'long', year: 'numeric' });
  return 'Letzte 7 Tage';
}

function getDateFilter() {
  if (chartRange === 'month') return new Date().toISOString().slice(0, 7);
  const start = new Date(Date.now() - 6 * 86400000).toISOString().slice(0, 10);
  return { start };
}

function entryInRange(e) {
  const f = getDateFilter();
  if (typeof f === 'string') return e.timestamp.startsWith(f);
  return e.timestamp.slice(0, 10) >= f.start;
}

function getChartColors() {
  const isDark = window.matchMedia('(prefers-color-scheme:dark)').matches;
  return {
    text: isDark ? '#f5f5f7' : '#1d1d1f',
    text2: isDark ? '#98989d' : '#6e6e73',
    grid: isDark ? 'rgba(255,255,255,.1)' : 'rgba(0,0,0,.08)',
  };
}

function chartDefaults(mini) {
  const c = getChartColors();
  return {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: !mini, labels: { color: c.text, font: { size: 11 } } },
      tooltip: { enabled: !mini, mode: 'index', intersect: false },
    },
    scales: {
      x: { ticks: { display: !mini, color: c.text2, font: { size: 10 }, maxRotation: 45 }, grid: { display: false } },
      y: { ticks: { display: !mini, color: c.text2, font: { size: 10 } }, grid: { color: c.grid } },
    },
  };
}

function getEntryLinks(e) { return e.durationLinks || (e.side === 'links' ? e.durationMin : 0) || 0; }
function getEntryRechts(e) { return e.durationRechts || (e.side === 'rechts' ? e.durationMin : 0) || 0; }
function getEntryBeide(e) { return e.durationBeide || (e.side === 'beide' ? e.durationMin : 0) || 0; }

function buildStillzeitData() {
  const entries = loadEntries().filter(e => e.type === 'stillen' && e.durationMin && entryInRange(e));
  const days = getChartDays();
  const linksData = days.map(d => entries.filter(e => e.timestamp.slice(0, 10) === d).reduce((s, e) => s + getEntryLinks(e), 0));
  const rechtsData = days.map(d => entries.filter(e => e.timestamp.slice(0, 10) === d).reduce((s, e) => s + getEntryRechts(e), 0));
  const beideData = days.map(d => entries.filter(e => e.timestamp.slice(0, 10) === d).reduce((s, e) => s + getEntryBeide(e), 0));
  return {
    labels: days.map(dayLabel),
    datasets: [
      { label: 'Links', data: linksData, backgroundColor: '#c084fc' },
      { label: 'Rechts', data: rechtsData, backgroundColor: '#a855f7' },
      { label: 'Beide', data: beideData, backgroundColor: '#7c3aed' },
    ]
  };
}

function buildStillpausenData() {
  const entries = loadEntries().filter(e => e.type === 'stillen' && entryInRange(e)).sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
  const labels = [];
  const data = [];
  for (let i = 1; i < entries.length; i++) {
    const diff = (new Date(entries[i].timestamp) - new Date(entries[i - 1].timestamp)) / 3600000;
    if (diff < 24) {
      const d = new Date(entries[i].timestamp);
      labels.push(d.toLocaleDateString('de-DE', { day: 'numeric' }) + '. ' + d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }));
      data.push(Math.round(diff * 10) / 10);
    }
  }
  return {
    labels,
    datasets: [{ label: 'Stunden', data, borderColor: '#c084fc', backgroundColor: 'rgba(192,132,252,.2)', fill: true, tension: 0.3 }]
  };
}

function buildWickelData() {
  const entries = loadEntries().filter(e => e.type === 'wickeln' && entryInRange(e));
  const days = getChartDays();
  const nassData = days.map(d => entries.filter(e => e.timestamp.slice(0, 10) === d && e.diaperType === 'nass').length);
  const stuhlData = days.map(d => entries.filter(e => e.timestamp.slice(0, 10) === d && e.diaperType === 'stuhl').length);
  const beidesData = days.map(d => entries.filter(e => e.timestamp.slice(0, 10) === d && e.diaperType === 'beides').length);
  return {
    labels: days.map(dayLabel),
    datasets: [
      { label: 'Nass', data: nassData, backgroundColor: '#22d3ee' },
      { label: 'Stuhl', data: stuhlData, backgroundColor: '#f59e0b' },
      { label: 'Beides', data: beidesData, backgroundColor: '#34d399' },
    ]
  };
}

function buildTemperaturData() {
  const entries = loadEntries().filter(e => e.tempValue && entryInRange(e)).sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
  const labels = entries.map(e => {
    const d = new Date(e.timestamp);
    return d.toLocaleDateString('de-DE', { day: 'numeric' }) + '. ' + d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
  });
  const data = entries.map(e => e.tempValue);
  const len = entries.length || 1;
  return {
    labels,
    datasets: [
      { label: '°C', data, borderColor: '#fb923c', backgroundColor: 'rgba(251,146,60,.15)', fill: true, tension: 0.3, order: 1 },
      { label: 'Optimal (37,5)', data: Array(len).fill(37.5), borderColor: 'rgba(52,211,153,.5)', borderDash: [4, 4], pointRadius: 0, fill: '+1', backgroundColor: 'rgba(52,211,153,.15)', order: 2 },
      { label: 'Optimal (36,5)', data: Array(len).fill(36.5), borderColor: 'rgba(52,211,153,.5)', borderDash: [4, 4], pointRadius: 0, fill: false, order: 3 },
      { label: 'Fieber (38°C)', data: Array(len).fill(38), borderColor: 'rgba(239,68,68,.5)', borderDash: [5, 5], pointRadius: 0, fill: false, order: 4 },
    ]
  };
}

const chartBuilders = {
  stillzeit: { data: buildStillzeitData, type: 'bar', title: () => '🤱 Stillzeit — ' + rangeTitle(), opts: { scales: { x: { stacked: true }, y: { stacked: true, title: { display: true, text: 'Minuten' } } } } },
  stillpausen: { data: buildStillpausenData, type: 'line', title: () => '⏱ Stillpausen — ' + rangeTitle(), opts: { scales: { y: { title: { display: true, text: 'Stunden' } } } } },
  wickel: { data: buildWickelData, type: 'bar', title: () => '👶 Wickeln — ' + rangeTitle(), opts: { scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true, title: { display: true, text: 'Anzahl' } } } } },
  temperatur: { data: buildTemperaturData, type: 'line', title: () => '🌡️ Temperatur — ' + rangeTitle(), opts: { scales: { y: { min: 35, max: 42, title: { display: true, text: '°C' } } } } },
};

function renderDashboard() {
  Object.keys(chartBuilders).forEach(key => {
    const builder = chartBuilders[key];
    const canvasId = 'mini' + key.charAt(0).toUpperCase() + key.slice(1);
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    if (miniCharts[key]) miniCharts[key].destroy();
    const defaults = chartDefaults(true);
    miniCharts[key] = new Chart(canvas, {
      type: builder.type,
      data: builder.data(),
      options: { ...defaults, ...builder.opts, plugins: { ...defaults.plugins, legend: { display: false } } },
    });
  });
}

function openChart(key) {
  const builder = chartBuilders[key];
  if (!builder) return;
  document.getElementById('chartTitle').textContent = typeof builder.title === 'function' ? builder.title() : builder.title;
  document.getElementById('chartOverlay').classList.add('open');
  if (fullChart) fullChart.destroy();
  const defaults = chartDefaults(false);
  const mergedScales = {};
  if (builder.opts && builder.opts.scales) {
    Object.keys(builder.opts.scales).forEach(k => {
      mergedScales[k] = { ...(defaults.scales[k] || {}), ...builder.opts.scales[k], ticks: { ...(defaults.scales[k]?.ticks || {}), ...(builder.opts.scales[k]?.ticks || {}) }, grid: { ...(defaults.scales[k]?.grid || {}), ...(builder.opts.scales[k]?.grid || {}) } };
    });
  }
  fullChart = new Chart(document.getElementById('chartFull'), {
    type: builder.type,
    data: builder.data(),
    options: { ...defaults, scales: { ...defaults.scales, ...mergedScales }, plugins: { ...defaults.plugins, legend: { display: true, labels: { color: getChartColors().text } }, tooltip: { enabled: true } } },
  });
}

function closeChart() {
  document.getElementById('chartOverlay').classList.remove('open');
  if (fullChart) { fullChart.destroy(); fullChart = null; }
}

// Init
renderEntries();
if (typeof Chart !== 'undefined') renderDashboard();
</script>
</body>
</html>
